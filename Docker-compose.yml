version: "3.9"

# ─────────────────────────────────────────────────────────────
#  ServiceNow Customer Care Stack
#  • postgres   – PostgreSQL 16 auto-seeded on first start
#  • pgadmin    – pgAdmin 4, pre-configured to connect to postgres
#
#  Start:  docker compose up -d
#  pgAdmin: http://localhost:5050
#           Email   : admin@admin.com
#           Password: admin
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       servicenow
      POSTGRES_USER:     snuser
      POSTGRES_PASSWORD: snpassword
    ports:
      - "5432:5432"
    volumes:
      # SQL init scripts run automatically in alphabetical order on first start
      - ./ServiceNowDB/init.sql:/docker-entrypoint-initdb.d/init.sql

      # Persist data between restarts
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snuser -d servicenow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin 4 ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sn_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # Tell pgAdmin where to find the pre-configured server list
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      # Pre-configured server definition
      - ./servers.json:/pgadmin4/servers.json:ro
      # Passfile so pgAdmin connects without prompting for password
      - ./pgpass:/pgpass:ro
      # Persist pgAdmin preferences / sessions
      - pgadmin_data:/var/lib/pgadmin
    entrypoint: >
      /bin/sh -c "
        chmod 600 /pgpass &&
        chown pgadmin:pgadmin /pgpass 2>/dev/null || true &&
        /entrypoint.sh
      "

volumes:
  pg_data:
  pgadmin_data: